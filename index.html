<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Firestoreテスト</title>
<style>
body{
    font-family: monospace;
    background:#111;
    color:#0f0;
}
#log{
    white-space:pre-wrap;
    border:1px solid #444;
    padding:10px;
}
</style>
</head>
<body>

<h2>Firestore接続テスト</h2>
<div id="log">start...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const logEl = document.getElementById("log");

function log(msg){
    console.log(msg);
    logEl.textContent += "\n" + msg;
}

function logError(e){
    console.error(e);

    log("\n===== ERROR =====");
    log("message: " + e.message);
    log("code: " + (e.code || "none"));
    log("name: " + (e.name || "none"));
    log("stack:\n" + e.stack);
}

const firebaseConfig = {
 apiKey: "AIzaSyAuSr-KgBjfvp-yroLH2X0tujZaUenFVsY",
 authDomain: "boxwood-spot-486909-j1.firebaseapp.com",
 projectId: "boxwood-spot-486909-j1",
 storageBucket: "boxwood-spot-486909-j1.firebasestorage.app",
 messagingSenderId: "899371812603",
 appId: "1:899371812603:web:ced1901f7a3abb5e0e125e"
};

try{

    log("Firebase initialize...");

    const app = initializeApp(firebaseConfig);
    log("App initialized");

    const db = getFirestore(app);
    log("Firestore connected");

    async function load(){

        try{

            log("Reading collection: test");

            const snapshot = await getDocs(collection(db,"test"));

            log("Documents found: " + snapshot.size);

            snapshot.forEach(doc=>{
                log("doc id: " + doc.id);
                log("data: " + JSON.stringify(doc.data()));
            });

            if(snapshot.size===0){
                log("No documents.");
            }

        }catch(e){
            logError(e);
        }

    }

    load();

}catch(e){
    logError(e);
}

</script>

</body>
</html>
