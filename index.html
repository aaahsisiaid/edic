<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Firestore読み取り</title>
</head>
<body>

<h2>Firestore データ</h2>
<pre id="out">読み込み中...</pre>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyAuSr-KgBjfvp-yroLH2X0tujZaUenFVsY",
 authDomain: "boxwood-spot-486909-j1.firebaseapp.com",
 projectId: "boxwood-spot-486909-j1",
 storageBucket: "boxwood-spot-486909-j1.firebasestorage.app",
 messagingSenderId: "899371812603",
 appId: "1:899371812603:web:ced1901f7a3abb5e0e125e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function load() {

    const querySnapshot = await getDocs(collection(db, "test"));

    let text = "";

    querySnapshot.forEach((doc) => {
        text += doc.id + " : " + JSON.stringify(doc.data()) + "\n";
    });

    document.getElementById("out").textContent = text || "データなし";
}

load();

</script>

</body>
</html>
