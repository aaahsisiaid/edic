<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>セキュリティテスト</title>
<style>
body { background: linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%); font-family:sans-serif; margin:0; display:flex; justify-content:center; align-items:center; height:100vh;}
.login-container { background:white; padding:40px; border-radius:20px; box-shadow:0 15px 35px rgba(0,0,0,0.1); width:100%; max-width:350px; text-align:center;}
input { width:100%; padding:15px; margin-bottom:15px; border:1px solid #ddd; border-radius:10px; font-size:16px;}
button { width:100%; padding:15px; background:#4A90E2; color:white; border:none; border-radius:10px; font-size:16px; font-weight:bold;}
pre {text-align:left; font-size:12px; max-height:200px; overflow:auto; background:#eee; padding:10px; border-radius:10px;}
</style>
</head>

<body>
<div class="login-container">
<h1>セキュリティテスト</h1>

<input type="text" id="memberId" placeholder="会員番号 8桁">
<input type="password" id="password" placeholder="パスワード">

<button id="loginBtn">ログイン</button>

<pre id="dump"></pre>
<button id="downloadBtn">JSON保存</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";

const firebaseConfig = {
apiKey:"AIzaSyAuSr-KgBjfvp-yroLH2X0tujZaUenFVsY",
authDomain:"boxwood-spot-486909-j1.firebaseapp.com",
projectId:"boxwood-spot-486909-j1",
storageBucket:"boxwood-spot-486909-j1.firebasestorage.app",
messagingSenderId:"899371812603",
appId:"1:899371812603:web:ced1901f7a3abb5e0e125e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const functions = getFunctions(app,"us-central1");

let lastData = null;

document.getElementById("loginBtn").onclick = async () => {

const inputId = document.getElementById("memberId").value.trim();
const inputPw = document.getElementById("password").value.trim();

if(!inputId || !inputPw){
alert("入力してください");
return;
}

try{

await signInWithEmailAndPassword(
auth,
`${inputId}@your-school-member.com`,
inputPw
);

const checkLogin = httpsCallable(functions,"checkLogin");
const result = await checkLogin({memberId:inputId});

console.log("取得データ:",result.data);

lastData = result.data;

document.getElementById("dump").textContent =
JSON.stringify(result.data,null,2);

}catch(e){

console.error(e);
alert("ログイン失敗");

}

};

document.getElementById("downloadBtn").onclick = () => {

if(!lastData) return;

const blob = new Blob(
[JSON.stringify(lastData,null,2)],
{type:"application/json"}
);

const a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "data.json";
a.click();

};

</script>
</body>
</html>
