<html lang="ja"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - 理社講座マイページ</title>
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h1 { font-size: 22px; color: #333; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #4A90E2; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #357abd; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>理社講座受講生ログイン</h1>
        <p style="font-size:14px; color:#666; margin-bottom:30px;">会員番号とパスワードを入力してください</p>
        <input type="text" id="memberId" placeholder="会員番号　8桁" inputmode="numeric">
        <input type="password" id="password" placeholder="パスワード">
        <button id="loginBtn">ログイン</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";

        const firebaseConfig = { apiKey: "AIzaSyAuSr-KgBjfvp-yroLH2X0tujZaUenFVsY", authDomain: "boxwood-spot-486909-j1.firebaseapp.com", projectId: "boxwood-spot-486909-j1", storageBucket: "boxwood-spot-486909-j1.firebasestorage.app", messagingSenderId: "899371812603", appId: "1:899371812603:web:ced1901f7a3abb5e0e125e" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const functions = getFunctions(app, "us-central1");

    document.getElementById("loginBtn").onclick = async () => {
            const inputId = document.getElementById("memberId").value.trim();
            const inputPw = document.getElementById("password").value.trim();

            if (!inputId || !inputPw) return alert("入力してください");

            const btn = document.getElementById("loginBtn");
            btn.disabled = true;
            btn.innerText = "ログイン中...";

            try {
                // Firebase認証
                await signInWithEmailAndPassword(auth, `${inputId}@your-school-member.com`, inputPw);
                
                // サーバー通信（確実に memberId という名前で送る）
                const checkLogin = httpsCallable(functions, 'checkLogin');
                const result = await checkLogin({ memberId: inputId });
                const d = result.data;

                if (d.success) {
                    localStorage.clear();
                    localStorage.setItem("memberId", inputId);
                    localStorage.setItem("mName", d.name);
                    localStorage.setItem("mGrade", d.grade);
                    localStorage.setItem("schedule", JSON.stringify(d.schedule));
                    localStorage.setItem("nextSchedule", JSON.stringify(d.nextSchedule));
                    localStorage.setItem("courseDescriptions", JSON.stringify(d.descriptions));
                    localStorage.setItem("fullNextMaster", JSON.stringify(d.fullNextMaster));
                    window.location.href = d.isFirstLogin ? "reset-password.html" : "mypage.html";
                } else {
                    alert("名簿エラー: " + d.message);
                }
            } catch (e) {
                alert("ログイン失敗: 会員番号またはパスワードが違います。");
            } finally {
                btn.disabled = false;
                btn.innerText = "ログイン";
            }
        };
    </script>

<div popover="manual" style="z-index: 2147483647 !important; padding: 0px !important; margin: 0px !important; border-radius: 8px !important; position: fixed !important; color-scheme: normal !important; box-shadow: rgba(0, 0, 0, 0.15) 0px 2px 4px 0px, rgba(0, 0, 0, 0.18) 0px 8px 15px 6px !important; border: 1px solid rgba(0, 0, 0, 0.9) !important; overflow: hidden !important; backdrop-filter: blur(20px) !important; background-color: rgba(35, 35, 35, 0.83) !important; top: 470px !important; left: 560px !important; opacity: 0 !important; visibility: hidden !important;"></div></body></html>
