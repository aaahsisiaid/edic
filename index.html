<!DOCTYPE html>
<html>
<body>
<pre id="log"></pre>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const log = t => document.getElementById("log").textContent += t + "\n";

const firebaseConfig = {
 apiKey: "AIzaSyAuSr-KgBjfvp-yroLH2X0tujZaUenFVsY",
 authDomain: "boxwood-spot-486909-j1.firebaseapp.com",
 projectId: "boxwood-spot-486909-j1",
 storageBucket: "boxwood-spot-486909-j1.firebasestorage.app",
 messagingSenderId: "899371812603",
 appId: "1:899371812603:web:ced1901f7a3abb5e0e125e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const guesses = [
"users","user","messages","chat","posts","data","items",
"logs","config","settings","admin","list","rooms","comments"
];

async function scan(){

for(const name of guesses){

    try{
        log("checking: " + name);

        const snap = await getDocs(collection(db,name));

        if(snap.size > 0){
            log("FOUND: " + name + " ("+snap.size+" docs)");
        }else{
            log("exists but empty: " + name);
        }

    }catch(e){
        log("blocked: " + name + " -> " + e.code);
    }

}

}

scan();

</script>

</body>
</html>
